services:
  postgres:
    image: postgres:16-alpine
    container_name: hq-to-video-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hqtovideo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
